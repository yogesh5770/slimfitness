# Elite Cloud Build Config (Codemagic)
# This allows you to build iOS apps from Windows using Cloud Macs.

workflows:
  ios-build:
    name: SlimFitness iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Fetch Dependencies
        script: flutter pub get
      - name: Build iOS
        script: |
          # Unsigned build for Windows users
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - slimfitness@gmail.com
