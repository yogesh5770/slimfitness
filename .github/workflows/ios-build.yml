name: "Elite iOS Build (Windows Cloud Sync)"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: "Build iOS App"
    runs-on: macos-latest
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: "Install Dependencies"
        run: flutter pub get

      - name: "Build iOS - ADMIN"
        run: flutter build ios --release --no-codesign -t lib/main_admin.dart

      - name: "Build iOS - MEMBER"
        run: flutter build ios --release --no-codesign -t lib/main_member.dart

      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: SlimFitness-Elite-iOS-Builds
          path: |
            build/ios/iphoneos/Runner.app
