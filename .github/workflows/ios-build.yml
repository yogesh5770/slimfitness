name: "Elite Universal Build (Android + iOS)"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: "Build Android APKs"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: "Install Dependencies"
        run: flutter pub get

      - name: "Build Android - ADMIN"
        run: flutter build apk --release -t lib/main_admin.dart --build-number=$GITHUB_RUN_NUMBER

      - name: "Build Android - MEMBER"
        run: flutter build apk --release -t lib/main_member.dart --build-number=$GITHUB_RUN_NUMBER

      - name: "Upload APK Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: SlimFitness-Android-APKs
          path: build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS IPAs"
    runs-on: macos-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: "Install Dependencies"
        run: flutter pub get

      - name: "Build iOS - ADMIN"
        run: |
          # 1. Prepare assets and AOT without Team ID check using Simulator target
          flutter build ios --release --no-codesign --simulator -t lib/main_admin.dart --build-number=$GITHUB_RUN_NUMBER
          
          # 2. Force Archive for Real Device bypassing Flutter's Team ID check
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos \
            BUNDLE_ID=com.slimfitness.admin \
            DEVELOPMENT_TEAM=1234567890 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS="" \
            clean archive -archivePath build/ios/iphoneos/Admin.xcarchive
          
          # 3. Package IPA
          mkdir -p build/ios/iphoneos/Admin-Payload/Payload
          cp -r build/ios/iphoneos/Admin.xcarchive/Products/Applications/Runner.app build/ios/iphoneos/Admin-Payload/Payload/
          cd build/ios/iphoneos/Admin-Payload && zip -r ../SlimFitness-Admin.ipa Payload

      - name: "Build iOS - MEMBER"
        run: |
          # 1. Pre-build for Simulator
          flutter build ios --release --no-codesign --simulator -t lib/main_member.dart --build-number=$GITHUB_RUN_NUMBER
          
          # 2. Force Archive for Real Device
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos \
            BUNDLE_ID=com.slimfitness.member \
            DEVELOPMENT_TEAM=1234567890 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS="" \
            clean archive -archivePath build/ios/iphoneos/Member.xcarchive
          
          # 3. Package IPA
          mkdir -p build/ios/iphoneos/Member-Payload/Payload
          cp -r build/ios/iphoneos/Member.xcarchive/Products/Applications/Runner.app build/ios/iphoneos/Member-Payload/Payload/
          cd build/ios/iphoneos/Member-Payload && zip -r ../SlimFitness-Member.ipa Payload

      - name: "Upload iOS Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: SlimFitness-iOS-IPAs
          path: build/ios/iphoneos/*.ipa
