name: "Elite iOS Build (Windows Cloud Sync)"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: "Build iOS App"
    runs-on: macos-latest
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v3

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: "Install Dependencies"
        run: flutter pub get

      - name: "Execute iOS Cloud Build"
        # Since I don't have your Apple certificates, this build will generate 
        # the app bundle but won't sign it. Perfect for verifying and cloud-resigning.
        run: flutter build ios --release --no-codesign

      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v3
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
