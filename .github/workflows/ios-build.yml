name: "Elite Universal Build (Android + iOS)"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: "Build Android APKs"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: "Install Dependencies"
        run: flutter pub get

      - name: "Build Android - ADMIN"
        run: flutter build apk --release -t lib/main_admin.dart --build-number=$GITHUB_RUN_NUMBER

      - name: "Build Android - MEMBER"
        run: flutter build apk --release -t lib/main_member.dart --build-number=$GITHUB_RUN_NUMBER

      - name: "Upload APK Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: SlimFitness-Android-APKs
          path: build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS IPAs"
    runs-on: macos-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: "Install Dependencies"
        run: flutter pub get

      - name: "Build iOS - ADMIN"
        run: |
          # Force bypass all signing checks at the engine level
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export PROVISIONING_PROFILE_SPECIFIER=""
          
          # 1. Start build and ignore Flutter's post-build validation error
          # If 'Xcode build done' appears in the log, we have our binary!
          flutter build ios --release --no-codesign -t lib/main_admin.dart --build-number=$GITHUB_RUN_NUMBER || echo "Flutter validation error ignored. Verifying build artifacts..."
          
          # 2. Package IPA if the .app folder was successfully generated
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "SUCCESS: Runner.app found. Packaging Admin IPA..."
            mkdir -p build/ios/iphoneos/Admin-Payload/Payload
            cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Admin-Payload/Payload/
            cd build/ios/iphoneos/Admin-Payload && zip -r ../SlimFitness-Admin.ipa Payload
            # Clean up for next flavor
            rm -rf build/ios/iphoneos/Runner.app
          else
            echo "CRITICAL ERROR: Runner.app not found. Build truly failed."
            exit 1
          fi

      - name: "Build iOS - MEMBER"
        run: |
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export PROVISIONING_PROFILE_SPECIFIER=""
          
          # 1. Standard build
          flutter build ios --release --no-codesign -t lib/main_member.dart --build-number=$GITHUB_RUN_NUMBER || echo "Flutter validation error ignored. Verifying build artifacts..."
          
          # 2. Package IPA
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "SUCCESS: Runner.app found. Packaging Member IPA..."
            mkdir -p build/ios/iphoneos/Member-Payload/Payload
            cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Member-Payload/Payload/
            cd build/ios/iphoneos/Member-Payload && zip -r ../SlimFitness-Member.ipa Payload
          else
            echo "CRITICAL ERROR: Runner.app not found. Build truly failed."
            exit 1
          fi

      - name: "Upload iOS Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: SlimFitness-iOS-IPAs
          path: build/ios/iphoneos/*.ipa
