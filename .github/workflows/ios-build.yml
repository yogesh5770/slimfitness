name: "Elite iOS Build (Windows Cloud Sync)"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: "Build iOS App"
    runs-on: macos-latest
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: "Install Dependencies"
        run: flutter pub get

      - name: "Build iOS - ADMIN"
        run: |
          flutter build ios --release --no-codesign -t lib/main_admin.dart
          mkdir -p build/ios/iphoneos/Admin-Payload/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Admin-Payload/Payload/
          cd build/ios/iphoneos/Admin-Payload && zip -r ../SlimFitness-Admin.ipa Payload

      - name: "Build iOS - MEMBER"
        run: |
          flutter build ios --release --no-codesign -t lib/main_member.dart
          mkdir -p build/ios/iphoneos/Member-Payload/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Member-Payload/Payload/
          cd build/ios/iphoneos/Member-Payload && zip -r ../SlimFitness-Member.ipa Payload

      - name: "Build iOS Simulator - MEMBER"
        run: |
          flutter build ios --simulator --no-codesign -t lib/main_member.dart
          # Debug: List all files if the build folder doesn't exist
          if [ ! -d "build/ios/iphonesimulator/Runner.app" ]; then
            echo "Build directory not found! Debugging structure..."
            ls -R build/ios
          fi
          # Zip the simulator build
          cd build/ios/iphonesimulator && zip -r ../../SlimFitness-Member-Simulator.zip Runner.app

      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: SlimFitness-Elite-IPAs
          path: |
            build/ios/iphoneos/*.ipa
            *.zip
